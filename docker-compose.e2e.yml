services:
  app:
    restart: 'no'

  e2e:
    # Tag MUST match @playwright/test in e2e/package.json (browsers are bundled per version).
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /e2e
    volumes:
      - ./e2e:/e2e
    environment:
      - E2E_BASE_URL=http://localhost:3000
    command: /e2e/test.sh
    # Share the app's network namespace so the app is reachable at localhost:3000.
    network_mode: 'service:app'
    depends_on:
      app:
        condition: service_started
